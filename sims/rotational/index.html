<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>
  .sim-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem;
    align-items: center;
    margin-bottom: 0.75rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.95rem;
  }
  .sim-controls label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .sim-controls select,
  .sim-controls input[type="checkbox"] {
    cursor: pointer;
  }
  #tempSlider {
    width: 180px;
    cursor: pointer;
  }
  #tempValue {
    display: inline-block;
    min-width: 2.5em;
    text-align: right;
    font-weight: 600;
  }
  #chartContainer {
    width: 100%;
    min-height: 450px;
  }
  #peakSection {
    margin-top: 1rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.9rem;
  }
  #peakSection h3 {
    margin: 0 0 0.5rem;
    font-size: 1rem;
  }
  #peakTableWrap {
    max-height: 180px;
    overflow-y: auto;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-bottom: 0.5rem;
  }
  #peakTable {
    width: 100%;
    border-collapse: collapse;
  }
  #peakTable th,
  #peakTable td {
    padding: 0.3rem 0.6rem;
    text-align: left;
  }
  #peakTable th {
    background: #f7f7f7;
    border-bottom: 2px solid #ddd;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  #peakTable td {
    border-bottom: 1px solid #eee;
  }
  .peak-actions {
    display: flex;
    gap: 0.5rem;
  }
  .peak-actions button {
    padding: 0.35rem 1rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .peak-actions button:hover {
    background: #f0f0f0;
  }
  .remove-btn {
    cursor: pointer;
    color: #c00;
    background: none;
    border: none;

  }

    padding: 1rem;

    text-align: center;
  }
</style>

<div class="sim-controls">
  <label>Temperature:
    <input type="range" id="tempSlider" min="1" max="500" value="298">
    <span id="tempValue">298</span> K
  </label>
  <label>X-axis:
    <select id="unitSelect">
      <option value="wn">Wavenumbers (cm⁻¹)</option>
      <option value="ghz">Frequency (GHz)</option>
    </select>
  </label>
  <label><input type="checkbox" id="logCheck"> Log scale</label>
</div>

<div id="chartContainer"></div>

<div id="peakSection">
  <h3>Picked Peaks</h3>
  <div id="peakTableWrap">
    <table id="peakTable">
      <thead>
        <tr><th>#</th><th>Frequency</th><th></th></tr>
      </thead>
      <tbody>
        <tr><td colspan="4" class="peak-empty">Click on a peak to record its frequency</td></tr>
      </tbody>
    </table>
  </div>
  <div class="peak-actions">
    <button id="copyBtn">Copy</button>
    <button id="clearBtn">Clear</button>
  </div>
</div>

<script>
(function() {
  var HC_OVER_K = 1.4387769; // hc/k in cm*K
  var CM1_TO_GHZ = 29.9792458;
  var MAX_FREQ = 400; // cm-1

  var isotopologues = [
    { label: "H\u00B3\u2075Cl", B: 10.5934, D: 5.319e-4, abundance: 0.7577 },
    { label: "H\u00B3\u2077Cl", B: 10.5782, D: 5.307e-4, abundance: 0.2423 }
  ];

  var params = new URLSearchParams(window.location.search);
  var T = Math.max(1, Math.min(500, parseFloat(params.get("T")) || 298));
  var sigma = Math.max(0.01, parseFloat(params.get("sigma")) || 1.0);
  var unit = "wn";
  var logScale = false;

  var npoints = Math.max(2000, Math.min(50000, Math.round(MAX_FREQ / (sigma / 25))));
  var dx = MAX_FREQ / npoints;
  var xGrid = new Array(npoints);
  for (var i = 0; i < npoints; i++) xGrid[i] = i * dx;

  var allTransitions = [];
  var peaks = [];

  function partitionFunction(B, D, temperature) {
    var Q = 0;
    for (var J = 0; J < 150; J++) {
      var EJ = B * J * (J + 1) - D * J * J * (J + 1) * (J + 1);
      var term = (2 * J + 1) * Math.exp(-HC_OVER_K * EJ / temperature);
      Q += term;
      if (HC_OVER_K * EJ / temperature > 100) break;
    }
    return Q;
  }

  function computeSpectrum(temperature) {
    var y = new Array(npoints);
    for (var i = 0; i < npoints; i++) y[i] = 0;
    var inv2s2 = 1 / (2 * sigma * sigma);
    var cutoff = 4 * sigma;
    allTransitions = [];

    for (var m = 0; m < isotopologues.length; m++) {
      var mol = isotopologues[m];
      var Q = partitionFunction(mol.B, mol.D, temperature);
      for (var J = 0; ; J++) {
        var Jp1 = J + 1;
        var nu = 2 * mol.B * Jp1 - 4 * mol.D * Jp1 * Jp1 * Jp1;
        if (nu > MAX_FREQ + cutoff) break;
        var EJ = mol.B * J * Jp1 - mol.D * J * J * Jp1 * Jp1;
        var intens = mol.abundance * Jp1 * Math.exp(-HC_OVER_K * EJ / temperature) / Q;
        allTransitions.push({ freq: nu, J: J, iso: mol.label, intensity: intens });

        var iMin = Math.max(0, Math.floor((nu - cutoff) / dx));
        var iMax = Math.min(npoints - 1, Math.ceil((nu + cutoff) / dx));
        for (var k = iMin; k <= iMax; k++) {
          var dv = xGrid[k] - nu;
          y[k] += intens * Math.exp(-dv * dv * inv2s2);
        }
      }
    }

    var floor = 1e-10;
    for (var i = 0; i < npoints; i++) {
      if (y[i] < floor) y[i] = floor;
    }
    return y;
  }

  function displayX() {
    if (unit === "ghz") return xGrid.map(function(v) { return v * CM1_TO_GHZ; });
    return xGrid.slice();
  }

  function xLabel() {
    return unit === "ghz" ? "Frequency (GHz)" : "Wavenumber (cm\u207B\u00B9)";
  }

  function convertFreq(f) {
    return unit === "ghz" ? f * CM1_TO_GHZ : f;
  }

  function formatFreq(f) {
    var v = convertFreq(f);
    return v.toFixed(2) + (unit === "ghz" ? " GHz" : " cm\u207B\u00B9");
  }

  // --- Initial render ---
  var yData = computeSpectrum(T);
  var chartDiv = document.getElementById("chartContainer");

  Plotly.newPlot(chartDiv, [{
    x: displayX(),
    y: yData,
    type: "scatter",
    mode: "lines",
    fill: "tozeroy",
    line: { color: "#1f77b4", width: 1.5 },
    fillcolor: "rgba(31,119,180,0.15)"
  }], {
    title: { text: "HCl Rotational Spectrum", font: { size: 16 } },
    xaxis: { title: xLabel(), range: [0, MAX_FREQ] },
    yaxis: { title: "Intensity (arb.)", rangemode: "tozero" },
    margin: { t: 50, b: 55, l: 60, r: 20 },
    hovermode: "closest"
  }, {
    responsive: true,
    displaylogo: false,
    modeBarButtonsToRemove: ["lasso2d", "select2d"]
  });

  // --- Temperature slider ---
  var slider = document.getElementById("tempSlider");
  var tempDisp = document.getElementById("tempValue");
  slider.value = T;
  tempDisp.textContent = T;

  slider.addEventListener("input", function() {
    T = parseInt(this.value);
    tempDisp.textContent = T;
    yData = computeSpectrum(T);
    Plotly.restyle(chartDiv, { y: [yData] });
  });

  // --- Unit toggle ---
  document.getElementById("unitSelect").addEventListener("change", function() {
    unit = this.value;
    var xMax = unit === "ghz" ? MAX_FREQ * CM1_TO_GHZ : MAX_FREQ;
    Plotly.update(chartDiv,
      { x: [displayX()] },
      { "xaxis.title": xLabel(), "xaxis.range": [0, xMax] }
    );
    refreshPeakTable();
  });

  // --- Log scale toggle ---
  document.getElementById("logCheck").addEventListener("change", function() {
    logScale = this.checked;
    Plotly.relayout(chartDiv, {
      "yaxis.type": logScale ? "log" : "linear",
      "yaxis.rangemode": logScale ? "normal" : "tozero",
      "yaxis.autorange": true
    });
  });

  // --- Axis constraints ---
  var relayoutGuard = false;
  chartDiv.on("plotly_relayout", function(ed) {
    if (relayoutGuard) return;
    var fix = {};
    var need = false;
    var xMax = unit === "ghz" ? MAX_FREQ * CM1_TO_GHZ : MAX_FREQ;

    if ("xaxis.range[0]" in ed && ed["xaxis.range[0]"] < 0) {
      fix["xaxis.range[0]"] = 0;
      need = true;
    }
    if ("xaxis.range[1]" in ed && ed["xaxis.range[1]"] > xMax) {
      fix["xaxis.range[1]"] = xMax;
      need = true;
    }
    if (!logScale && "yaxis.range[0]" in ed && ed["yaxis.range[0]"] > 0) {
      fix["yaxis.range[0]"] = 0;
      need = true;
    }
    if (need) {
      relayoutGuard = true;
      Plotly.relayout(chartDiv, fix).then(function() { relayoutGuard = false; });
    }
  });

  // --- Peak picker ---
  chartDiv.on("plotly_click", function(data) {
    var clickX = data.points[0].x;
    var clickCm1 = unit === "ghz" ? clickX / CM1_TO_GHZ : clickX;
    var best = null;
    var bestDist = Infinity;
    for (var i = 0; i < allTransitions.length; i++) {
      var d = Math.abs(allTransitions[i].freq - clickCm1);
      if (d < bestDist) { bestDist = d; best = allTransitions[i]; }
    }
    if (best && bestDist < 3 * sigma) {
      peaks.push(best);
      refreshPeakTable();
    }
  });

  function refreshPeakTable() {
    var tbody = document.querySelector("#peakTable tbody");
    if (peaks.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="peak-empty">Click on a peak to record its frequency</td></tr>';
      return;
    }
    var html = "";
    for (var i = 0; i < peaks.length; i++) {
      var p = peaks[i];
      html += "<tr><td>" + (i + 1) + "</td><td>" + formatFreq(p.freq) +
        '</td><td><button class="remove-btn" data-idx="' + i + '">\u00D7</button></td></tr>';
    }
    tbody.innerHTML = html;
  }

  document.getElementById("peakTable").addEventListener("click", function(e) {
    if (e.target.classList.contains("remove-btn")) {
      peaks.splice(parseInt(e.target.dataset.idx), 1);
      refreshPeakTable();
    }
  });

  document.getElementById("copyBtn").addEventListener("click", function() {
    var btn = this;
    var lines = peaks.map(function(p) { return convertFreq(p.freq).toFixed(4); });
    navigator.clipboard.writeText(lines.join("\n")).then(function() {
      btn.textContent = "Copied!";
      setTimeout(function() { btn.textContent = "Copy"; }, 1500);
    });
  });

  document.getElementById("clearBtn").addEventListener("click", function() {
    peaks.length = 0;
    refreshPeakTable();
  });
})();
</script>
