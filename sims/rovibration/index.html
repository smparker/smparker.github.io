---
layout: simulation
title: CO Rovibrational Spectrum
permalink: /sims/rovibration/
---
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>
  #sim-controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 0.75rem;
  }
  #sim-controls label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.95rem;
  }
  #tempSlider { width: 180px; }
  #tempDisplay {
    display: inline-block;
    min-width: 3ch;
    text-align: right;
    font-weight: 600;
  }
  #peakSection { margin-top: 1rem; }
  #peakSection h4 { margin: 0 0 0.5rem 0; }
  #peakTableWrap {
    max-height: 200px;
    overflow-y: auto;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-bottom: 0.5rem;
  }
  #peakTable {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  #peakTable th, #peakTable td {
    padding: 0.25rem 0.5rem;
    text-align: left;
    border-bottom: 1px solid #eee;
  }
  #peakTable th {
    position: sticky;
    top: 0;
    background: #f5f5f5;
  }
  .peak-remove {
    cursor: pointer;
    color: #c00;
    border: none;
    background: none;
    font-size: 1rem;
    padding: 0 0.25rem;
  }
  #peakButtons { display: flex; gap: 0.5rem; }
  #peakButtons button {
    padding: 0.3rem 0.75rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #f8f8f8;
    cursor: pointer;
    font-size: 0.85rem;
  }
  #peakButtons button:hover { background: #e8e8e8; }
</style>

<div id="sim-controls">
  <label>
    Temperature:
    <input type="range" id="tempSlider" min="50" max="1000" value="296" step="1">
    <span><span id="tempDisplay">296</span> K</span>
  </label>
  <label>
    <input type="checkbox" id="logScale"> Log scale
  </label>
</div>

<div id="chartContainer" class="responsive-chart"></div>

<div id="peakSection">
  <h4>Collected Peaks</h4>
  <div id="peakTableWrap">
    <table id="peakTable">
      <thead><tr><th>#</th><th>Frequency (cm⁻¹)</th><th></th></tr></thead>
      <tbody id="peakBody"></tbody>
    </table>
  </div>
  <div id="peakButtons">
    <button id="copyPeaks">Copy</button>
    <button id="clearPeaks">Clear</button>
  </div>
</div>

<script>
(function () {
  var we    = 2169.814;   // harmonic frequency, cm⁻¹
  var wexe  = 13.288;     // anharmonicity, cm⁻¹
  var Be    = 1.93128;    // equilibrium rotational constant, cm⁻¹
  var ae    = 0.01750;    // rotation-vibration coupling, cm⁻¹
  var De    = 6.121e-6;   // centrifugal distortion, cm⁻¹
  var HC_K  = 1.4388;     // hc/k, cm·K

  var SIGMA   = 0.5;
  var NPOINTS = 50000;
  var FMIN    = 1900;
  var FMAX    = 10800;
  var MAX_V   = 5;
  var MAX_J   = 50;

  var urlT = parseFloat(new URLSearchParams(window.location.search).get('T'));
  var T0 = (urlT > 0) ? urlT : 296;
  T0 = Math.max(50, Math.min(1000, Math.round(T0)));
  document.getElementById('tempSlider').value = T0;
  document.getElementById('tempDisplay').textContent = T0;

  var df = (FMAX - FMIN) / NPOINTS;
  var xGrid = new Float64Array(NPOINTS);
  for (var i = 0; i < NPOINTS; i++) xGrid[i] = FMIN + i * df;

  // Generate noise once so the baseline doesn't jitter when temperature changes
  var noiseY = new Float64Array(NPOINTS);
  (function () {
    var nnoise = 10;
    var noises = [];
    for (var n = 0; n < nnoise; n++) {
      noises.push({
        freq:  10 + Math.random() * 90,
        phase: Math.random() * 2 * Math.PI,
        amp:   0.0005 * Math.random() / nnoise
      });
    }
    for (var i = 0; i < NPOINTS; i++) {
      var y = 0;
      for (var n = 0; n < nnoise; n++)
        y += noises[n].amp * 0.5 * (1 + Math.sin(noises[n].freq * xGrid[i] + noises[n].phase));
      noiseY[i] = y;
    }
  })();

  function computeLines(T) {
    var B0 = Be - ae * 0.5;
    var kTcm = T / HC_K;

    var Q = 0;
    for (var J = 0; J <= MAX_J + 10; J++)
      Q += (2 * J + 1) * Math.exp(-B0 * J * (J + 1) / kTcm);

    var lines = [];
    for (var v = 1; v <= MAX_V; v++) {
      var nu0 = we * v - wexe * v * (v + 1);
      var Bv  = Be - ae * (v + 0.5);

      var ovScale = 1;
      for (var k = 2; k <= v; k++) ovScale /= k;

      for (var J = 0; J <= MAX_J; J++) {
        var Elower = B0 * J * (J + 1) - De * J * J * (J + 1) * (J + 1);
        var boltz  = Math.exp(-B0 * J * (J + 1) / kTcm);

        // R branch: J" = J  ->  J' = J + 1
        var Jr = J + 1;
        var EupR = Bv * Jr * (Jr + 1) - De * Jr * Jr * (Jr + 1) * (Jr + 1);
        lines.push({ freq: nu0 + EupR - Elower, intensity: ovScale * (J + 1) * boltz / Q });

        // P branch: J" = J  ->  J' = J - 1  (J > 0)
        if (J > 0) {
          var Jp = J - 1;
          var EupP = Bv * Jp * (Jp + 1) - De * Jp * Jp * (Jp + 1) * (Jp + 1);
          lines.push({ freq: nu0 + EupP - Elower, intensity: ovScale * J * boltz / Q });
        }
      }
    }
    lines.sort(function (a, b) { return a.freq - b.freq; });
    return lines;
  }

  function computeSpectrum(lines) {
    var y = new Float64Array(NPOINTS);
    for (var i = 0; i < NPOINTS; i++) y[i] = noiseY[i];

    var cutoff   = 3 * SIGMA;
    var invSigSq = 1 / (SIGMA * SIGMA);

    for (var k = 0; k < lines.length; k++) {
      var lf = lines[k].freq;
      if (lf < FMIN - cutoff || lf > FMAX + cutoff) continue;
      var li = lines[k].intensity;
      var ic = Math.round((lf - FMIN) / df);
      var hw = Math.ceil(cutoff / df);
      var lo = ic - hw; if (lo < 0) lo = 0;
      var hi = ic + hw; if (hi >= NPOINTS) hi = NPOINTS - 1;
      for (var i = lo; i <= hi; i++) {
        var dv = xGrid[i] - lf;
        y[i] += li * Math.exp(-dv * dv * invSigSq);
      }
    }
    return y;
  }

  // --- Initial computation ---
  var currentLines = computeLines(T0);
  var currentY     = computeSpectrum(currentLines);

  // --- Plotly chart ---
  var chartDiv = document.getElementById('chartContainer');

  var trace = {
    x: Array.from(xGrid),
    y: Array.from(currentY),
    type: 'scatter',
    mode: 'lines',
    fill: 'tozeroy',
    line: { color: '#1f77b4', width: 1 },
    hovertemplate: '%{x:.2f} cm\u207b\u00b9<br>%{y:.5f}<extra></extra>'
  };

  var layout = {
    title: 'CO Rovibrational Spectrum',
    xaxis: { title: 'Frequency (cm\u207b\u00b9)', range: [FMIN, FMAX] },
    yaxis: { title: 'Intensity (arb.)',  rangemode: 'tozero' },
    margin: { t: 50, r: 30, b: 50, l: 70 },
    dragmode: 'zoom'
  };

  Plotly.newPlot(chartDiv, [trace], layout, {
    responsive: true,
    displaylogo: false,
    modeBarButtonsToRemove: ['lasso2d', 'select2d']
  });

  // --- Temperature slider ---
  var slider   = document.getElementById('tempSlider');
  var tempDisp = document.getElementById('tempDisplay');

  slider.addEventListener('input', function () {
    var T = parseFloat(this.value);
    tempDisp.textContent = Math.round(T);
    currentLines = computeLines(T);
    currentY     = computeSpectrum(currentLines);
    Plotly.restyle(chartDiv, { y: [Array.from(currentY)] }, [0]);
  });

  // --- Log scale toggle ---
  document.getElementById('logScale').addEventListener('change', function () {
    Plotly.relayout(chartDiv, { 'yaxis.type': this.checked ? 'log' : 'linear' });
  });

  // --- Axis constraints ---
  chartDiv.on('plotly_relayout', function (ev) {
    if (!ev) return;
    var fix = {};
    var need = false;
    if (ev['yaxis.range[0]'] !== undefined && ev['yaxis.range[0]'] < 0) {
      fix['yaxis.range[0]'] = 0; need = true;
    }
    if (ev['xaxis.range[0]'] !== undefined && ev['xaxis.range[0]'] < FMIN) {
      fix['xaxis.range[0]'] = FMIN; need = true;
    }
    if (ev['xaxis.range[1]'] !== undefined && ev['xaxis.range[1]'] > FMAX) {
      fix['xaxis.range[1]'] = FMAX; need = true;
    }
    if (need) Plotly.relayout(chartDiv, fix);
  });

  // --- Peak picker ---
  var peaks    = [];
  var peakBody = document.getElementById('peakBody');

  function renderPeaks() {
    peakBody.innerHTML = '';
    for (var i = 0; i < peaks.length; i++) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + (i + 1) + '</td>' +
        '<td>' + peaks[i].toFixed(2) + '</td>' +
        '<td><button class="peak-remove" data-idx="' + i + '">\u00d7</button></td>';
      peakBody.appendChild(tr);
    }
  }

  chartDiv.on('plotly_click', function (data) {
    if (data.points && data.points.length > 0) {
      peaks.push(data.points[0].x);
      renderPeaks();
    }
  });

  peakBody.addEventListener('click', function (e) {
    if (e.target.classList.contains('peak-remove')) {
      peaks.splice(parseInt(e.target.dataset.idx), 1);
      renderPeaks();
    }
  });

  document.getElementById('copyPeaks').addEventListener('click', function () {
    var text = peaks.map(function (f) { return f.toFixed(2); }).join('\n');
    navigator.clipboard.writeText(text);
    var btn = this;
    btn.textContent = 'Copied!';
    setTimeout(function () { btn.textContent = 'Copy'; }, 1200);
  });

  document.getElementById('clearPeaks').addEventListener('click', function () {
    peaks.length = 0;
    renderPeaks();
  });
})();
</script>
